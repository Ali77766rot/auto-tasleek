name: Android APK Build from ZIP
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip AutoTasleek.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Wrapper and Build APK
        run: |
          cd AutoTasleek
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Tasleek
          path: AutoTasleek/app/build/outputs/apk/debug/*.apk
