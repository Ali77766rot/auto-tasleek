name: Android APK Build from ZIP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip AutoTasleek.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle Wrapper 7.5.1
        run: |
          # استخدام نسخة gradle المثبتة مسبقاً في ubuntu-latest لتوليد الـ wrapper
          gradle wrapper --gradle-version 7.5.1
          # نقل الملفات
          cp -r gradlew gradlew.bat gradle AutoTasleek/
          chmod +x AutoTasleek/gradlew

      - name: Build Debug APK
        run: |
          cd AutoTasleek
          # التأكد من أن الملفات موجودة وقابلة للتنفيذ
          ls -R gradle
          ./gradlew assembleDebug

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Tasleek
          path: AutoTasleek/app/build/outputs/apk/debug/*.apk
