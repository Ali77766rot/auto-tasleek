name: Android APK Build from ZIP
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip AutoTasleek.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5.1

      - name: Generate Gradle Wrapper 7.5.1
        run: |
          gradle wrapper --gradle-version 7.5.1
          cp -r gradlew gradlew.bat gradle AutoTasleek
          chmod +x AutoTasleek/gradlew

      - name: Build Debug APK
        run: |
          cd AutoTasleek
          ./gradlew assembleDebug

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Tasleek
          path: AutoTasleek/app/build/outputs/apk/debug/*.apk
