name: Android APK Build from ZIP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip AutoTasleek.zip
          # عرض محتويات المجلد الحالي للتأكد من الهيكلية
          ls -F

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate and Build
        run: |
          # البحث عن المجلد الذي يحتوي على ملف build.gradle
          PROJECT_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          echo "Project directory found at: \$PROJECT_DIR"
          
          # توليد الـ wrapper بإصدار 7.5.1
          gradle wrapper --gradle-version 7.5.1
          
          # نقل ملفات الـ wrapper إلى مجلد المشروع
          cp -r gradlew gradlew.bat gradle "\$PROJECT_DIR/"
          chmod +x "\$PROJECT_DIR/gradlew"
          
          # البدء في البناء
          cd "\$PROJECT_DIR"
          ./gradlew assembleDebug

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Tasleek
          path: "**/build/outputs/apk/debug/*.apk"
